    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
      if (window.lucide) {
        lucide.createIcons({
          attrs: {
            "stroke-width": 2.2
          }
        });
      }

      const typewriterText = document.querySelector(".typewriter-text");
      const typewriterPhrases = [
        "VENDA DE PEN-DRIVE ATUALIDADO",
        "CD PERSONALIZADO",
        "ATUALIZAÇÕES DE PEN-DRIVE",
        "E MUITO MAIS"
      ];

      if (typewriterText) {
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        if (reduceMotion) {
          typewriterText.textContent = typewriterPhrases[0];
        } else {
        let phraseIndex = 0;
        let characterIndex = 0;
        let deleting = false;

        const type = () => {
          const currentPhrase = typewriterPhrases[phraseIndex];
          typewriterText.textContent = currentPhrase.slice(0, characterIndex);

          if (!deleting && characterIndex < currentPhrase.length) {
            characterIndex += 1;
            setTimeout(type, 72);
            return;
          }

          if (!deleting && characterIndex === currentPhrase.length) {
            deleting = true;
            setTimeout(type, 1500);
            return;
          }

          if (deleting && characterIndex > 0) {
            characterIndex -= 1;
            setTimeout(type, 38);
            return;
          }

          deleting = false;
          phraseIndex = (phraseIndex + 1) % typewriterPhrases.length;
          setTimeout(type, 260);
        };

        type();
        }
      }
    </script>
